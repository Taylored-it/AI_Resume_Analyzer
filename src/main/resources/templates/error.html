<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — AI Resume Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 48px 44px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .icon { font-size: 3.5rem; margin-bottom: 20px; display: block; }
        h1 { font-size: 1.5rem; color: #1e1b4b; margin-bottom: 10px; }
        p { color: #6b7280; font-size: 0.93rem; line-height: 1.6; margin-bottom: 6px; }
        .status { font-size: 0.8rem; color: #9ca3af; margin-bottom: 32px; }
        .btn {
            display: inline-block;
            padding: 13px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.92rem;
        }
    </style>
</head>
<body>
<div class="card">
    <span class="icon">⚠️</span>
    <h1>Something went wrong</h1>
    <p th:text="${message ?: 'An unexpected error occurred.'}">An unexpected error occurred.</p>
    <p class="status" th:text="'Status: ' + ${status ?: 'Unknown'}">Status: 500</p>
    <a href="/" class="btn">← Back to Home</a>
</div>
</body>
</html>
